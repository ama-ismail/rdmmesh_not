# rdmmesh — local development stack.
#
# Start: docker compose -f docker/docker-compose.yml up -d
# Drop:  docker compose -f docker/docker-compose.yml down -v
#
# Stack:
#   * postgres        — общий OLTP-store для catalog/authoring/.../audit schemas (Flyway).
#   * keycloak        — OIDC issuer для realm `bank`, общий с OpenMetadata в проде.
#                       В dev — start-dev с h2 in-memory, realm импортируется при boot.
#   * rdmmesh-service — Dropwizard backend (Flyway autoMigrate, JWT через Keycloak).

name: rdmmesh

services:
  postgres:
    image: postgres:16-alpine
    container_name: rdmmesh-postgres
    environment:
      POSTGRES_USER: ${RDM_DB_ADMIN_USER:-rdmmesh_admin}
      POSTGRES_PASSWORD: ${RDM_DB_ADMIN_PASSWORD:-rdmmesh_admin_dev}
      POSTGRES_DB: ${RDM_DB_NAME:-rdmmesh}
    volumes:
      - rdmmesh-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${RDM_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: rdmmesh-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      # При импорте — overwrite, чтобы изменения realm-bank.json подхватывались на boot.
      KC_LOG_LEVEL: INFO
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      - "${KC_HTTP_PORT:-8090}:8080"
    # Образ Keycloak (ubi9-micro) не содержит curl/wget, а наш ранее использовавшийся
    # `exec 3<>/dev/tcp` HEAD-запрос капризен на Keycloak >25 (HTTP/1.1 chunked). Не делаем
    # healthcheck — сервис JWKS-кэш греет лениво при первом JWT, а realm-импорт
    # завершается за ~10 секунд (видно по `make logs`). Если для CI понадобится gating —
    # ввести отдельный wait-job через `wait-for-it.sh`.
    restart: unless-stopped

  # E14 round 10 — immutable audit-archive store. RustFS: Apache-2.0,
  # S3-совместимый (drop-in MinIO-замена), без AGPL/платных ограничений.
  # S3 API :9000, web-консоль :9001, контейнер под uid 10001.
  rustfs:
    # E14 round 13: запинен конкретный тег (был :latest — невоспроизводимо).
    # Override: RDM_RUSTFS_IMAGE. Бамп тега — осознанно, после регресс-smoke.
    image: ${RDM_RUSTFS_IMAGE:-rustfs/rustfs:1.0.0-beta.3}
    container_name: rdmmesh-rustfs
    environment:
      # Дефолтные root-креды RustFS (dev). В prod — из Vault, не в compose.
      RUSTFS_ACCESS_KEY: ${RDM_ARCHIVE_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RDM_ARCHIVE_SECRET_KEY:-rustfsadmin}
    volumes:
      - rdmmesh-rustfs-data:/data
      - rdmmesh-rustfs-logs:/logs
    ports:
      - "${RDM_ARCHIVE_API_PORT:-9000}:9000"
      - "${RDM_ARCHIVE_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped

  rdmmesh-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rdmmesh-service
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      rustfs:
        condition: service_started
    environment:
      RDM_DB_URL: jdbc:postgresql://postgres:5432/${RDM_DB_NAME:-rdmmesh}
      RDM_DB_USER: rdmmesh_app
      RDM_DB_PASSWORD: ${RDM_DB_APP_PASSWORD:-rdmmesh_dev}
      RDM_HTTP_PORT: 8080
      RDM_ADMIN_PORT: 8081
      RDM_FLYWAY_AUTO: "true"
      # OIDC: iss в токенах = http://localhost:8090/realms/bank (Keycloak ставит его по
      # Host-хедеру запроса, а пользовательские flows идут через localhost:8090). JWKS
      # загружается изнутри docker network через alias `keycloak` — это разные URL'ы
      # для разных целей: один валидируется как claim, другой используется для HTTP.
      RDM_KC_ISSUER_URI: ${RDM_KC_ISSUER_URI:-http://localhost:8090/realms/bank}
      RDM_KC_JWKS_URI:   ${RDM_KC_JWKS_URI:-http://keycloak:8080/realms/bank/protocol/openid-connect/certs}
      RDM_KC_AUDIENCE:   ${RDM_KC_AUDIENCE:-rdmmesh-backend}
      # OM REST для lazy lookup om_user_id (см. SPEC §2.4). В dev OM нет — оставлено пустым,
      # IdentityPort должен корректно деградировать (см. handoff §6 E2).
      RDM_OM_BASE_URL:   ${RDM_OM_BASE_URL:-}
      RDM_OM_BOT_TOKEN:  ${RDM_OM_BOT_TOKEN:-}
      # E14 round 10 — immutable audit-archive (RustFS, S3-совместимо).
      # Endpoint — внутри docker-сети по alias `rustfs`. Disabled-by-default
      # семантика: пустой RDM_ARCHIVE_ENDPOINT → ArchivePort = no-op-stub
      # (как OM-lookup в E2), сервис не падает без RustFS.
      RDM_ARCHIVE_ENDPOINT:   ${RDM_ARCHIVE_ENDPOINT:-http://rustfs:9000}
      RDM_ARCHIVE_BUCKET:     ${RDM_ARCHIVE_BUCKET:-rdmmesh-audit-archive}
      RDM_ARCHIVE_ACCESS_KEY: ${RDM_ARCHIVE_ACCESS_KEY:-rustfsadmin}
      RDM_ARCHIVE_SECRET_KEY: ${RDM_ARCHIVE_SECRET_KEY:-rustfsadmin}
      RDM_ARCHIVE_REGION:     ${RDM_ARCHIVE_REGION:-us-east-1}
      # E14 round 13 (Q62): Object-Lock режим. GOVERNANCE (default) —
      # admin с bypass-правом может снять retention; COMPLIANCE —
      # необратимо до retain-until даже для root (regulator-mandated
      # IFRS9). Менять на COMPLIANCE по решению compliance банка.
      RDM_ARCHIVE_LOCK_MODE:  ${RDM_ARCHIVE_LOCK_MODE:-GOVERNANCE}
    ports:
      - "${RDM_HTTP_PORT:-8080}:8080"
      - "${RDM_ADMIN_PORT:-8081}:8081"
    restart: unless-stopped

volumes:
  rdmmesh-postgres-data:
    name: rdmmesh-postgres-data
  rdmmesh-rustfs-data:
    name: rdmmesh-rustfs-data
  rdmmesh-rustfs-logs:
    name: rdmmesh-rustfs-logs
